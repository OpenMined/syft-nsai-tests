# End-to-end tests for SyftHub + Syft Space
#
# Triggers:
#   - workflow_call from syfthub / syft-space (on push to main)
#   - Nightly cron at 06:00 UTC
#   - Manual via workflow_dispatch (with optional ref overrides)
#   - Push to main in this repo

name: E2E Tests

on:
  workflow_call:
    inputs:
      syfthub_ref:
        type: string
        default: "main"
      syft_space_ref:
        type: string
        default: "main"

  schedule:
    - cron: "0 6 * * *" # every day at 06:00 UTC

  workflow_dispatch:
    inputs:
      syfthub_ref:
        description: "syfthub branch/tag/SHA to test"
        default: "main"
      syft_space_ref:
        description: "syft-space branch/tag/SHA to test"
        default: "main"

  push:
    branches: [main]

# Cancel in-progress runs for the same ref
concurrency:
  group: e2e-${{ github.event_name }}-${{ inputs.syfthub_ref || 'main' }}-${{ inputs.syft_space_ref || 'main' }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout repos ───────────────────────────────────────────
      - name: Checkout test repo
        uses: actions/checkout@v4

      - name: Checkout syfthub
        uses: actions/checkout@v4
        with:
          repository: OpenMined/syfthub
          ref: ${{ inputs.syfthub_ref || 'main' }}
          path: syfthub

      - name: Checkout syft-space
        uses: actions/checkout@v4
        with:
          repository: OpenMined/syft-space
          ref: ${{ inputs.syft_space_ref || 'main' }}
          path: syft-space

      # ── 2. Build prerequisites ──────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Expose GitHub Actions runtime for Docker cache
        uses: crazy-max/ghaction-github-runtime@v3

      # ── 3. Build everything in parallel ────────────────────────────
      - name: Cache ChromaDB ONNX models
        uses: actions/cache@v4
        with:
          path: .cache/chroma-models
          key: chroma-onnx-models-v1

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lockb') }}

      - name: Build prerequisites, images & install test deps
        run: |
          # Free disk space in background (removes ~15GB of unused pre-installed SDKs)
          (echo "[disk-cleanup] start" && sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc && echo "[disk-cleanup] done") &

          # Build syfthub SDK and syft-space frontend in parallel
          (echo "[sdk] start" && cd syfthub/sdk/typescript && npm ci && ./node_modules/.bin/tsup && echo "[sdk] done") &
          (echo "[frontend] start" && cd syft-space/frontend && bun install && bun run build && echo "[frontend] done") &

          # Install test deps in parallel
          (
            echo "[test-deps] start"
            bun install
            if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
              npx playwright install --with-deps chromium
            else
              npx playwright install-deps chromium
            fi
            echo "[test-deps] done"
          ) &

          (echo "[docker-prune] start" && sudo docker image prune -af && echo "[docker-prune] done") &

          # Wait for all background jobs before Docker build
          wait
          echo "[docker-build] start"

          # Pull image-only services and build custom images in parallel
          (echo "[docker-pull] start" && docker compose pull --ignore-buildable && echo "[docker-pull] done") &
          docker buildx bake -f docker-compose.yml -f docker-compose.override.yml -f docker-compose.ci.yml --load
          wait
          echo "[docker-build] done"
        timeout-minutes: 10

      # ── 4. Run tests ───────────────────────────────────────────────
      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true

      # ── 5. Test results in GitHub UI ────────────────────────────────
      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Tests
          path: test-results/junit.xml
          reporter: java-junit

      # ── 6. Artifacts ───────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --tail=200 > /tmp/docker-logs.txt 2>&1

      - name: Upload docker logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: /tmp/docker-logs.txt
          retention-days: 7

      # ── 7. Teardown ────────────────────────────────────────────────
      - name: Stop services
        if: always()
        run: docker compose down
