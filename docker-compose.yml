services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-syfthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syfthub}
      POSTGRES_DB: ${POSTGRES_DB:-syfthub}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syfthub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterkey}
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- SyftHub ---
  hub-backend:
    build:
      context: ../syfthub
      dockerfile: Dockerfile
      target: backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-syfthub}:${POSTGRES_PASSWORD:-syfthub}@postgres:5432/${POSTGRES_DB:-syfthub}
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterkey}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  hub-frontend:
    build:
      context: ../syfthub
      dockerfile: Dockerfile
      target: frontend
    environment:
      VITE_API_URL: http://hub-backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - hub-backend

  hub-proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - hub-backend
      - hub-frontend

  # --- Syft Space ---
  space:
    build:
      context: ../syft-space
      dockerfile: Dockerfile
    environment:
      SYFTBOX_ASSIGNED_PORT: "8081"
    ports:
      - "8081:8081"
